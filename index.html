<script>
// --- 3D Constellation Effect ---
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H;
let mouse = { x: 0, y: 0, ox: 0, oy: 0 };

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const STAR_COUNT = 180;
const CONNECTION_DIST = 130;
const MOUSE_INFLUENCE = 60;

const stars = Array.from({ length: STAR_COUNT }, () => ({
  x: (Math.random() - 0.5) * W * 1.5,
  y: (Math.random() - 0.5) * H * 1.5,
  z: Math.random() * 600 + 100,
  size: Math.random() * 2 + 0.5,
  baseX: 0, baseY: 0,
}));
stars.forEach(s => { s.baseX = s.x; s.baseY = s.y; });

const centerX = () => W / 2;
const centerY = () => H / 2;

function project(s) {
  const fov = 800;
  const scale = fov / (fov + s.z);
  return {
    sx: centerX() + s.x * scale,
    sy: centerY() + s.y * scale,
    scale,
  };
}

let time = 0;

function drawStars() {
  ctx.clearRect(0, 0, W, H);
  time += 0.002;

  const mx = mouse.x || centerX();
  const my = mouse.y || centerY();
  const dx = mx - centerX();
  const dy = my - centerY();

  const projected = stars.map(s => {
    const rx = s.baseX + dx * 0.15;
    const ry = s.baseY + dy * 0.15;
    const dz = Math.sin(time + s.baseX * 0.001 + s.baseY * 0.001) * 30
      + (Math.hypot(s.baseX - dx, s.baseY - dy) < MOUSE_INFLUENCE * 3 ? -40 : 0);
    s.x += (rx - s.x) * 0.03;
    s.y += (ry - s.y) * 0.03;
    s.z += (s.z + dz - s.z) * 0.03;
    const p = project(s);
    const distToMouse = Math.hypot(p.sx - mx, p.sy - my);
    if (distToMouse < MOUSE_INFLUENCE) {
      const force = (1 - distToMouse / MOUSE_INFLUENCE) * 0.5;
      p.sx += (p.sx - mx) * force;
      p.sy += (p.sy - my) * force;
    }
    return { s, p };
  });

  const pairs = [];
  for (let i = 0; i < projected.length; i++) {
    for (let j = i + 1; j < projected.length; j++) {
      const a = projected[i].p, b = projected[j].p;
      const d = Math.hypot(a.sx - b.sx, a.sy - b.sy);
      if (d < CONNECTION_DIST && a.scale > 0.15 && b.scale > 0.15) {
        pairs.push({ i, j, d });
      }
    }
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  for (const { i, j, d } of pairs) {
    const a = projected[i].p, b = projected[j].p;
    const alpha = (1 - d / CONNECTION_DIST) * 0.3 * Math.min(a.scale, b.scale);
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.moveTo(a.sx, a.sy);
    ctx.lineTo(b.sx, b.sy);
    ctx.stroke();
  }

  for (const { s, p } of projected) {
    const alpha = Math.min(1, p.scale * 1.2);
    ctx.fillStyle = `rgba(255,255,255,${alpha * 0.7})`;
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, s.size * p.scale, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(drawStars);
}

document.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});
document.addEventListener('mouseleave', () => {
  mouse.x = centerX();
  mouse.y = centerY();
});

drawStars();

// --- Data Fetching ---

      document.getElementById('discordIconWrap').innerHTML = `<img src="${iconUrl}" alt="${guild.name}" class="server-icon"/>`;
    }
    if (guild && guild.name) {
      document.getElementById('serverName').textContent = guild.name;
    }
    if (data.approximate_member_count) {

    }
  } catch (e) {
